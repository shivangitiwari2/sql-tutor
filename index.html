<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Tutor — 0 to 100</title>
<script src="https://js.puter.com/v2/"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f4; --surface: #ffffff; --surface2: #f9f9f8; --border: #e5e5e3;
  --text: #1a1a18; --text2: #6b6b68; --text3: #a3a3a0;
  --accent: #2563eb; --accent-bg: #eff6ff; --accent-text: #1d4ed8;
  --success-bg: #f0fdf4; --success-text: #15803d; --success-border: #bbf7d0;
  --danger-bg: #fef2f2; --danger-text: #dc2626; --danger-border: #fecaca;
  --pro-bg: #faf5ff; --pro-text: #7c3aed;
  --mono: 'Courier New', monospace; --radius: 8px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
#app { display: flex; height: 100vh; }

/* Sidebar */
#sidebar { width: 230px; min-width: 230px; border-right: 1px solid var(--border); background: var(--surface2); display: flex; flex-direction: column; overflow-y: auto; }
#sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
#sidebar-header h1 { font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
#sidebar-header p { font-size: 12px; color: var(--text3); margin-top: 3px; }
.topic-group { padding: 8px 0; }
.topic-group-label { font-size: 10px; font-weight: 600; color: var(--text3); padding: 4px 16px; text-transform: uppercase; letter-spacing: 0.06em; }
.topic-btn { width: 100%; text-align: left; padding: 7px 16px; font-size: 13px; color: var(--text2); background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.15s; }
.topic-btn:hover { background: var(--surface); color: var(--text); }
.topic-btn.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
.topic-btn .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background 0.2s; }
.topic-btn.done .dot { background: #16a34a; }
.topic-btn.active .dot { background: var(--accent); }
#progress-wrap { padding: 12px 16px; border-top: 1px solid var(--border); margin-top: auto; }
#progress-wrap p { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
#progress-track { background: var(--border); border-radius: 99px; height: 5px; }
#progress-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.4s; }

/* Main area */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#topbar { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--surface); }
#topic-title { font-size: 15px; font-weight: 500; flex: 1; color: var(--text); }
.badge { font-size: 11px; padding: 3px 9px; border-radius: 99px; font-weight: 500; }
.badge-level { background: var(--accent-bg); color: var(--accent-text); }
.badge-type { background: var(--bg); color: var(--text2); border: 1px solid var(--border); }

/* Chat */
#chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.msg { display: flex; gap: 10px; max-width: 90%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.ai { align-self: flex-start; }
.avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.avatar.ai-av { background: var(--pro-bg); color: var(--pro-text); }
.avatar.user-av { background: var(--accent-bg); color: var(--accent-text); }
.bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.65; border: 1px solid var(--border); }
.msg.ai .bubble { background: var(--surface); border-radius: 2px 12px 12px 12px; }
.msg.user .bubble { background: var(--accent-bg); border-radius: 12px 2px 12px 12px; }
.bubble pre { background: #1e1e1e; color: #d4d4d4; border-radius: var(--radius); padding: 10px 12px; margin: 8px 0; font-family: var(--mono); font-size: 13px; overflow-x: auto; white-space: pre-wrap; }
.bubble code { font-family: var(--mono); font-size: 12px; background: var(--bg); padding: 1px 5px; border-radius: 4px; border: 1px solid var(--border); }

/* MCQ */
.mcq-options { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
.mcq-btn { text-align: left; padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); font-size: 13px; cursor: pointer; color: var(--text); font-family: inherit; transition: all 0.15s; }
.mcq-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-bg); color: var(--accent-text); }
.mcq-btn.correct { border-color: var(--success-border); background: var(--success-bg); color: var(--success-text); font-weight: 500; }
.mcq-btn.wrong { border-color: var(--danger-border); background: var(--danger-bg); color: var(--danger-text); }
.mcq-btn:disabled { cursor: default; }

/* Input */
#input-area { padding: 14px 20px; border-top: 1px solid var(--border); background: var(--surface2); }
#sql-input { width: 100%; font-family: var(--mono); font-size: 13px; padding: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); resize: none; height: 68px; line-height: 1.5; margin-bottom: 8px; }
#sql-input:focus { outline: none; border-color: var(--accent); }
#input-row { display: flex; gap: 8px; align-items: center; }
#send-btn { padding: 7px 18px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; display: flex; align-items: center; gap: 6px; }
#send-btn:hover { background: #1d4ed8; }
#send-btn:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }
#hint-btn { padding: 7px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: none; color: var(--text2); font-size: 13px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; }
#hint-btn:hover { background: var(--surface); }
#input-tip { font-size: 11px; color: var(--text3); margin-left: auto; }

/* Typing animation */
.typing-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: blink 1.2s infinite; margin: 0 2px; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

/* Login overlay */
#login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; z-index: 999; }
#login-box { background: var(--surface); border-radius: 16px; padding: 32px; width: 400px; border: 1px solid var(--border); text-align: center; }
#login-box h2 { font-size: 20px; font-weight: 600; margin-bottom: 10px; }
#login-box p { font-size: 14px; color: var(--text2); line-height: 1.6; margin-bottom: 24px; }
#login-btn { padding: 10px 28px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; cursor: pointer; font-weight: 500; font-family: inherit; }
#login-btn:hover { background: #1d4ed8; }
#login-note { font-size: 12px; color: var(--text3); margin-top: 14px; }
</style>
</head>
<body>

<div id="login-overlay">
  <div id="login-box">
    <div style="font-size:36px;margin-bottom:12px;">🗄️</div>
    <h2>SQL Tutor — 0 to 100</h2>
    <p>Sign in with your free Puter account to start learning. No credit card, no API key — completely free.</p>
    <button id="login-btn" onclick="signIn()"><i class="ti ti-brand-google"></i> Sign in to start</button>
    <p id="login-note">Puter is free. Your progress is saved automatically.</p>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1><i class="ti ti-database"></i> SQL Tutor</h1>
      <p>0 to 100, step by step</p>
    </div>
    <div id="topic-list"></div>
    <div id="progress-wrap">
      <p id="progress-label">0% complete</p>
      <div id="progress-track"><div id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div id="main">
    <div id="topbar">
      <span id="topic-title">Pick a topic to start</span>
      <span class="badge badge-level" id="level-badge">Beginner</span>
      <span class="badge badge-type" id="type-badge">Concept</span>
      <span id="user-name" style="font-size:12px;color:var(--text3);margin-left:auto;"></span>
    </div>
    <div id="chat-area"></div>
    <div id="input-area">
      <textarea id="sql-input" placeholder="Type your SQL answer or pick an MCQ option above..."></textarea>
      <div id="input-row">
        <button id="send-btn" onclick="submitAnswer()"><i class="ti ti-send"></i> Submit</button>
        <button id="hint-btn" onclick="askHint()"><i class="ti ti-bulb"></i> Hint</button>
        <span id="input-tip">Ctrl+Enter to submit</span>
      </div>
    </div>
  </div>
</div>

<script>
const TOPICS = [
  { id:"select_basics",    label:"SELECT basics",          group:"Foundations",      level:"Beginner",     type:"Concept+MCQ" },
  { id:"where_filter",     label:"WHERE & filters",        group:"Foundations",      level:"Beginner",     type:"MCQ+Query" },
  { id:"order_limit",      label:"ORDER BY & LIMIT",       group:"Foundations",      level:"Beginner",     type:"MCQ+Query" },
  { id:"distinct_null",    label:"DISTINCT & NULL",        group:"Foundations",      level:"Beginner",     type:"MCQ" },
  { id:"aggregate",        label:"COUNT, SUM, AVG",        group:"Aggregates",       level:"Beginner",     type:"Query" },
  { id:"group_by",         label:"GROUP BY",               group:"Aggregates",       level:"Intermediate", type:"Query" },
  { id:"having",           label:"HAVING",                 group:"Aggregates",       level:"Intermediate", type:"Query" },
  { id:"joins_intro",      label:"JOINs — intro",          group:"JOINs",            level:"Intermediate", type:"Concept+MCQ" },
  { id:"inner_join",       label:"INNER JOIN",             group:"JOINs",            level:"Intermediate", type:"Query" },
  { id:"left_right_join",  label:"LEFT & RIGHT JOIN",      group:"JOINs",            level:"Intermediate", type:"Query" },
  { id:"self_cross_join",  label:"SELF & CROSS JOIN",      group:"JOINs",            level:"Intermediate", type:"MCQ+Query" },
  { id:"subqueries",       label:"Subqueries",             group:"Advanced",         level:"Advanced",     type:"Query" },
  { id:"cte",              label:"CTEs (WITH)",            group:"Advanced",         level:"Advanced",     type:"Query" },
  { id:"window_intro",     label:"Window functions — intro",group:"Window Functions", level:"Advanced",     type:"Concept+MCQ" },
  { id:"row_rank",         label:"ROW_NUMBER & RANK",      group:"Window Functions", level:"Advanced",     type:"Query" },
  { id:"lead_lag",         label:"LEAD & LAG",             group:"Window Functions", level:"Advanced",     type:"Query" },
  { id:"partitionby",      label:"PARTITION BY",           group:"Window Functions", level:"Advanced",     type:"Query" },
  { id:"indexes",          label:"Indexes",                group:"Performance",      level:"Expert",       type:"Concept+MCQ" },
  { id:"explain_plan",     label:"EXPLAIN & query plans",  group:"Performance",      level:"Expert",       type:"MCQ" },
  { id:"transactions",     label:"Transactions & ACID",    group:"Expert Topics",    level:"Expert",       type:"Concept+MCQ" },
];

let currentTopic = null;
let doneTopics = new Set();
let conversationHistory = [];
let isLoading = false;

async function signIn() {
  try {
    const user = await puter.auth.signIn();
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("user-name").textContent = user.username || "";
    await loadProgress();
  } catch(e) {
    alert("Sign in failed. Please try again.");
  }
}

async function loadProgress() {
  try {
    const raw = await puter.kv.get("sql_tutor_progress");
    if(raw) {
      const data = JSON.parse(raw);
      doneTopics = new Set(data.done || []);
    }
  } catch(e) {}
  buildSidebar();
  updateProgress();
  showWelcome();
}

async function saveProgress() {
  try {
    await puter.kv.set("sql_tutor_progress", JSON.stringify({ done: [...doneTopics] }));
  } catch(e) {}
}

function buildSidebar() {
  const list = document.getElementById("topic-list");
  list.innerHTML = "";
  const groups = {};
  TOPICS.forEach(t => { if(!groups[t.group]) groups[t.group]=[]; groups[t.group].push(t); });
  Object.entries(groups).forEach(([g, topics]) => {
    const div = document.createElement("div");
    div.className = "topic-group";
    div.innerHTML = `<div class="topic-group-label">${g}</div>`;
    topics.forEach(t => {
      const btn = document.createElement("button");
      btn.className = "topic-btn" + (doneTopics.has(t.id) ? " done" : "");
      btn.id = "tbtn-" + t.id;
      btn.innerHTML = `<span class="dot"></span>${t.label}`;
      btn.onclick = () => loadTopic(t);
      div.appendChild(btn);
    });
    list.appendChild(div);
  });
}

function updateProgress() {
  const pct = Math.round((doneTopics.size / TOPICS.length) * 100);
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-label").textContent = pct + "% complete";
}

function showWelcome() {
  const chat = document.getElementById("chat-area");
  chat.innerHTML = "";
  const el = document.createElement("div");
  el.className = "msg ai";
  el.innerHTML = `<div class="avatar ai-av"><i class="ti ti-robot"></i></div>
    <div class="bubble">
      Hey! I'm your SQL tutor. Pick any topic from the left to start — from <code>SELECT</code> basics all the way to window functions, indexes, and transactions.<br><br>
      I'll explain the concept, quiz you, and if you get something wrong I'll break down exactly why — then give you another question to reinforce it. Let's go! 🎯
    </div>`;
  chat.appendChild(el);
}

async function loadTopic(topic) {
  if(isLoading) return;
  currentTopic = topic;
  conversationHistory = [];

  document.querySelectorAll(".topic-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tbtn-" + topic.id).classList.add("active");
  document.getElementById("topic-title").textContent = topic.label;
  document.getElementById("level-badge").textContent = topic.level;
  document.getElementById("type-badge").textContent = topic.type;
  document.getElementById("chat-area").innerHTML = "";
  document.getElementById("sql-input").value = "";

  const isMCQ = topic.type.includes("MCQ");
  const startMsg = `Teach me about "${topic.label}" (${topic.level} level).

First, give a clear 2-3 sentence explanation of the concept with a simple example.

Then ask me ONE question. ${isMCQ
    ? 'Make it a multiple choice question with 4 options. At the very end of your response, on its own line, output this exact JSON (no extra text around it): {"mcq":["A. option text","B. option text","C. option text","D. option text"],"answer":"A"}'
    : 'Ask me to write a SQL query. Use a simple realistic table like employees, orders, or students.'
  }`;

  await sendToAI(startMsg, false);
}

function buildSystemPrompt(topic) {
  return `You are a friendly, expert SQL tutor teaching ${topic.label} at ${topic.level} level.

Rules:
- Always explain concepts clearly and simply
- Ask one question at a time
- When evaluating answers:
  - If CORRECT: say "Correct!" briefly explain why it's right, then ask a slightly harder follow-up
  - If WRONG: explain exactly what's wrong and why, show the correct answer, then give a new similar question to try again
- For MCQ questions: always end your response with a JSON block on its own line: {"mcq":["A. text","B. text","C. text","D. text"],"answer":"B"}
- For SQL queries: after evaluation, show the correct SQL with a brief explanation
- Be encouraging but never say something is correct when it is wrong
- Keep responses concise — 3-6 sentences max per turn`;
}

async function sendToAI(userMessage, addToHistory = true) {
  if(!currentTopic) return;
  isLoading = true;
  setButtonState(true);

  if(addToHistory) {
    addUserMessage(userMessage);
    conversationHistory.push({ role: "user", content: userMessage });
  }

  addTypingIndicator();

  try {
    const systemPrompt = buildSystemPrompt(currentTopic);
    const messages = addToHistory
      ? conversationHistory
      : [{ role: "user", content: userMessage }];

    const response = await puter.ai.chat(
      messages.map(m => ({ role: m.role, content: m.content })),
      { model: "gemini-2.0-flash", system: systemPrompt }
    );

    const reply = typeof response === "string" ? response : response?.message?.content?.[0]?.text || response?.text || String(response);

    removeTypingIndicator();
    conversationHistory.push({ role: "assistant", content: reply });
    if(!addToHistory) conversationHistory = [{ role: "assistant", content: reply }];
    renderAIMessage(reply);

    if(reply.match(/\bcorrect\b|\bwell done\b|\bgreat job\b|\bexactly right\b|\bperfect\b/i)) {
      doneTopics.add(currentTopic.id);
      document.getElementById("tbtn-" + currentTopic.id).classList.add("done");
      updateProgress();
      saveProgress();
    }
  } catch(e) {
    removeTypingIndicator();
    addErrorMessage("Something went wrong. Please try again.");
    console.error(e);
  }

  isLoading = false;
  setButtonState(false);
}

function setButtonState(loading) {
  const btn = document.getElementById("send-btn");
  btn.disabled = loading;
  btn.innerHTML = loading
    ? `<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>`
    : `<i class="ti ti-send"></i> Submit`;
}

function renderAIMessage(text) {
  const chat = document.getElementById("chat-area");
  let mcqData = null, cleanText = text;

  const mcqMatch = text.match(/\{[\s\S]*?"mcq"[\s\S]*?\}/);
  if(mcqMatch) {
    try {
      mcqData = JSON.parse(mcqMatch[0]);
      cleanText = text.replace(mcqMatch[0], "").trim();
    } catch(e) {}
  }

  const formatted = cleanText
    .replace(/```sql([\s\S]*?)```/g, (_, c) => `<pre>${esc(c.trim())}</pre>`)
    .replace(/```([\s\S]*?)```/g, (_, c) => `<pre>${esc(c.trim())}</pre>`)
    .replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`)
    .replace(/\*\*(.*?)\*\*/g, (_, c) => `<strong>${c}</strong>`)
    .replace(/\n/g, "<br>");

  const msg = document.createElement("div");
  msg.className = "msg ai";
  msg.innerHTML = `<div class="avatar ai-av"><i class="ti ti-robot"></i></div>
    <div class="bubble">${formatted}${mcqData ? renderMCQ(mcqData) : ""}</div>`;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;

  document.getElementById("sql-input").placeholder = mcqData
    ? "Pick A/B/C/D above, or type your reasoning..."
    : "Write your SQL query here...";
}

function renderMCQ(data) {
  const letters = ["A","B","C","D"];
  const opts = data.mcq.map((opt, i) =>
    `<button class="mcq-btn" onclick="pickMCQ(this,'${letters[i]}','${data.answer}')">${opt}</button>`
  ).join("");
  return `<div class="mcq-options">${opts}</div>`;
}

function pickMCQ(btn, chosen, correct) {
  const allBtns = btn.closest(".mcq-options").querySelectorAll(".mcq-btn");
  allBtns.forEach(b => {
    b.disabled = true;
    if(b.textContent.trim().startsWith(correct + ".") || b.textContent.trim().startsWith(correct + " ")) {
      b.classList.add("correct");
    }
  });
  if(chosen !== correct) btn.classList.add("wrong");
  sendToAI(`My answer is ${chosen}: ${btn.textContent.trim()}`);
}

function addUserMessage(text) {
  const chat = document.getElementById("chat-area");
  const msg = document.createElement("div");
  msg.className = "msg user";
  msg.innerHTML = `<div class="avatar user-av"><i class="ti ti-user"></i></div>
    <div class="bubble">${esc(text).replace(/\n/g, "<br>")}</div>`;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function addErrorMessage(text) {
  const chat = document.getElementById("chat-area");
  const msg = document.createElement("div");
  msg.className = "msg ai";
  msg.innerHTML = `<div class="avatar ai-av"><i class="ti ti-alert-circle"></i></div>
    <div class="bubble" style="color:var(--danger-text);border-color:var(--danger-border)">${text}</div>`;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function addTypingIndicator() {
  const chat = document.getElementById("chat-area");
  const el = document.createElement("div");
  el.className = "msg ai"; el.id = "typing-indicator";
  el.innerHTML = `<div class="avatar ai-av"><i class="ti ti-robot"></i></div>
    <div class="bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function removeTypingIndicator() {
  document.getElementById("typing-indicator")?.remove();
}

async function submitAnswer() {
  const input = document.getElementById("sql-input");
  const val = input.value.trim();
  if(!val || !currentTopic || isLoading) return;
  input.value = "";
  await sendToAI(val);
}

async function askHint() {
  if(!currentTopic || isLoading) return;
  await sendToAI("Can you give me a hint without revealing the full answer?");
}

function esc(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

document.getElementById("sql-input").addEventListener("keydown", e => {
  if(e.key === "Enter" && e.ctrlKey) { e.preventDefault(); submitAnswer(); }
});

// Auto-check if already signed in
(async () => {
  try {
    const isSignedIn = await puter.auth.isSignedIn();
    if(isSignedIn) {
      const user = await puter.auth.getUser();
      document.getElementById("login-overlay").style.display = "none";
      document.getElementById("user-name").textContent = user?.username || "";
      await loadProgress();
    } else {
      buildSidebar();
    }
  } catch(e) {
    buildSidebar();
  }
})();
</script>
</body>
</html>
